# DAgger recording: YOU play as agent_0 against the BC model.
# This lets you encounter the BC model's failure states and record corrections.
# Change layout_name in BOTH environment AND agent_1 config (must match for topology features).
environment:
  layout_name: forced_coordination
  horizon: 400
policies:
  agent_0:
    type: builtin
    name: human_keyboard           # YOU play as agent_0 (Arrows + Space)
  agent_1:
    type: python_class             # BC model as partner
    path: policies/trained_agent.py
    class_name: TrainedAgent
    config:
      model_path: ../train/models/bc_agent_gnn.pt
      deterministic: true
      layout_name: forced_coordination  # must match environment.layout_name
data_collection:
  enabled: true
  output_dir: data/user_recordings
  record_agent_indices: [0]        # Records YOUR actions as agent_0
  include_next_obs: true
  save_npz: true
