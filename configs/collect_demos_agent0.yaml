# Position-swap recording: YOU play as agent_0 (to teach the model agent_0's perspective)
# Change layout_name between maps.
environment:
  layout_name: counter_circuit  # Use for built-in maps: asymmetric_advantages, forced_coordination, simple_o, cramped_room, coordination_ring, counter_circuit
  horizon: 400
policies:
  agent_0:
    type: builtin
    name: human_keyboard           # YOU play as agent_0 (Arrows + Space)
  agent_1:
    type: builtin
    name: greedy_full_task         # AI partner
    ingredient: onion
    avoid_teammate: true
data_collection:
  enabled: true
  output_dir: data/user_recordings
  record_agent_indices: [0]        # Records YOUR actions as agent_0
  include_next_obs: true
  save_npz: true
