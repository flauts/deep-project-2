seed: 67
mode: debug
environment:
  layout_name: null
  layout_file: layouts/scenario_4.layout
  horizon: 400
  old_dynamics: true
policies:
  agent_0:
    type: builtin
    name: random_motion
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: python_class
    path: policies/trained_agent.py
    class_name: TrainedAgent
    config:
      model_path: ../train/models/bc_agent_gnn.pt
      deterministic: true
      layout_name: scenario_4
execution:
  num_episodes: 1
  episode_seeds:
  - 67
  swap_agent_positions: false
observation:
  type: featurized
  include_agent_index: true
rendering:
  mode: window
  fps: 5
  window_caption: Overcooked-AI Basic Policies
  save_gif: false
  gif_path: outputs/basic_policies.gif
logging:
  output_dir: outputs/basic_policies_run
  save_step_log: true
  save_episode_summary: true
  save_trajectory_pickle: true
