seed: 42
mode: debug
environment:
  layout_name: asymmetric_advantages
  layout_file: null
  horizon: 400
  old_dynamics: true
policies:
  agent_0:
    type: builtin
    name: human_keyboard
  agent_1:
    type: python_class
    path: policies/trained_agent.py
    class_name: TrainedAgent
    config:
      model_path: ../train/models/bc_agent.pt
      deterministic: false
execution:
  num_episodes: 1
  episode_seeds:
  - 42
  swap_agent_positions: false
observation:
  type: featurized
  include_agent_index: true
rendering:
  mode: window
  fps: 10
  window_caption: Play WITH Your Overcooked AI Teammate!
logging:
  output_dir: outputs/play_with_ai_run
  save_step_log: true
  save_episode_summary: true
